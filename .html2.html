    /* Global Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Setting background for the whole page */
    body {
  font-family: 'Roboto', sans-serif;
  background-color: rgba(0, 0, 0, 0.5); /* Dark overlay to improve visibility */
  height: 100vh; /* Ensure the body takes the full height of the viewport */
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  background-image: url('C:\Users\Windows 11\Documents\ai_joker\ai_chatbox_joker\app.py\image\Image logo background_r0tlgcr0tlgcr0tl.png');
  background-size: cover; /* Ensure the background image covers the entire area */
  background-position: center; /* Keep the background image centered */
  background-attachment: fixed; /* Ensures the background stays in place while scrolling */
}

.chat-container {
  background: rgba(255, 255, 255, 0.9); /* Semi-transparent background */
  border-radius: 20px;
  padding: 20px;
  max-width: 500px;
  width: 100%;
  height: 80%;
  display: flex;
  flex-direction: column;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
  backdrop-filter: blur(10px); /* Blur effect to enhance visibility of text */
  position: relative;
  z-index: 2; /* Ensure chatbot stays on top of the background */
}

/* Styling for messages and input box */
.message-box {
  max-width: 70%;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  font-size: 16px;
}

.user-message {
  background-color: #3B82F6;
  color: white;
  text-align: right;
}

.bot-message {
  background-color: #F1F5F9;
  color: #333;
  text-align: left;
}

/* Input and button styles */
.input-container {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.input-box {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #D1D5DB;
  font-size: 14px;
  outline: none;
}

.send-btn {
  background-color: #3B82F6;
  color: white;
  padding: 12px 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

.send-btn:hover {
  background-color: #2563EB;
}

.feedback-btn {
  background: none;
  border: none;
  cursor: pointer;
  margin-top: 5px;
  font-size: 18px;
}

.typing-indicator {
  font-style: italic;
  color: #6B7280;
}

/* Responsiveness */
@media (max-width: 768px) {
  .chat-container {
    max-width: 90%;
    padding: 15px;
  }
  .message-box {
    padding: 10px;
    font-size: 14px;
  }
}

@media (max-width: 480px) {
